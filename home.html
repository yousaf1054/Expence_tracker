<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Ledger</title>
    <!-- Bootstrap first -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- FontAwesome next -->
    <link
      rel="stylesheet"
      href="assets/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <!-- Your custom styles last so they successfully override bootstrap -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/navbar.css" />
  </head>

  <body>
    <div id="navbar-container"></div>

    <main>
      <div class="mt-5">
        <div class="container mt-5">
          <div class="row g-4 mt-4">
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="balance">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i class="fa fa-wallet fs-4" style="color: #108927"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Balance</h6>
                    <div class="h4 mb-0" id="current-amount"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="spent">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i
                        class="fa-solid fa-dollar fs-4"
                        style="color: #e63946"
                      ></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Total Spent</h6>
                    <div class="h4 mb-0" id="spent-amount"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="month">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i
                        class="fa-solid fa-calendar fs-4"
                        style="color: #c98a2c"
                      ></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">
                      Total Earnings
                    </h6>
                    <div class="h4 mb-0" id="earnings-amount"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="category">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span>
                      <i
                        class="fa-solid fa-tags fs-4"
                        style="color: #1b2430"
                      ></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Top Category</h6>
                    <div class="h4 mb-0" id="item-category"><h3>Nill</h3></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="logout-modal"></div>
      <div>
        <div class="card container mt-5">
          <h1 class="text-center mt-5 text-primary">Expense Analysis</h1>
          <div id="analysis-empty-state" class="d-none px-4 py-5 text-center">
            <div
              class="d-flex flex-column align-items-center justify-content-center gap-3"
              style="min-height: 320px"
            >
              <i class="fa-solid fa-box-open text-muted fs-1"></i>
              <h4 class="text-muted">No Records Found</h4>
            </div>
          </div>
          <div id="analysis-grid">
            <div
              class="container d-flex justify-content-center align-items-center gap-5 mt-2"
            >
              <div class="card p-3 m-5 w-50 mx-auto" height="300">
                <canvas id="weeklyChart"></canvas>
              </div>
              <div class="card p-3 m-5 w-50 mx-auto" height="300">
                <canvas id="monthlyChart"></canvas>
              </div>
            </div>
            <div
              class="container d-flex justify-content-center align-items-center gap-5"
            >
              <div class="card p-3 m-5 w-50 mx-auto" height="300">
                <canvas id="yearlyChart"></canvas>
              </div>
              <div class="card p-3 m-5 w-50 mx-auto">
                <canvas id="categoryChart" height="300"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 1100"
    >
      <div
        id="loginToast"
        class="toast align-items-center"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toastMessage"></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/config/supabase.js"></script>

    <script src="js/auth/authguard.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/componets/load_navebar.js"></script>

    <script src="js/componets/load-modal.js"></script>

    <script src="js/auth/logout.js"></script>

    <script src="js/home.js"></script>
  </body>
</html>
