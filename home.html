<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Bootstrap first -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- FontAwesome next -->
    <link
      rel="stylesheet"
      href="assets/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <!-- Your custom styles last so they successfully override bootstrap -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/navbar.css" />
  </head>

  <body>
    <div id="navbar-container"></div>
    
    <main>
      <div class="mt-5">
        <div class="container mt-5">
          <div class="row g-4 mt-4">
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="balance">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i class="fa fa-wallet fs-4" style="color: #108927"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Balance</h6>
                    <div class="h4 mb-0" id="current-amount">5000000</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="spent">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i class="fa-solid fa-dollar fs-4" style="color: #e63946"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Total Spent</h6>
                    <div class="h4 mb-0" id="spent-amount">5000000</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="month">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i class="fa-solid fa-calendar fs-4" style="color: #c98a2c;"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">This Month</h6>
                    <div class="h4 mb-0" id="this-month">5000000</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="category">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                      <i class="fa-solid fa-tags fs-4" style="color:#1b2430;"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Top Category</h6>
                    <div class="h4 mb-0" id="item-category">food</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="logout-modal"></div>
    </main>
        <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100">
      <div id="loginToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage"></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config/supabase.js"></script>
     <SCript src="js\auth\authguard.js"></SCript>
    <script src="js\componets\load_navebar.js"></script>
    <script src="js\auth\logout.js"></script>
    <script src="js\componets\load-modal.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
