<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Bootstrap first -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- FontAwesome next -->
    <link
      rel="stylesheet"
      href="assets/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <!-- Your custom styles last so they successfully override bootstrap -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/navbar.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-light custom-navbar">
      <div class="container-fluid px-4">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="home.html"
        >
          <i class="fas fa-wallet fs-4 text-success"></i>
          <div>
            <span class="fw-bold mb-0 h4 d-block fa">Ledger<span>.</span></span>
            <small
              style="
                font-size: 0.7rem;
                display: block;
                margin-top: -4px;
                color: var(--muted);
              "
              >Personal Expense Tracker</small
            >
          </div>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-2">
            <li class="nav-item">
              <a class="nav-link active" href="home.html"
                ><i class="fas fa-home"></i>Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="add-expense.html"
                ><i class="fas fa-plus-circle"></i> Expense</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="view-expense.html"
                ><i class="fa fa-eye"></i> Expenses</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profile.html"
                ><i class="fa fa-user"></i>Profile</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link logout-btn fw-semibold ms-lg-3"
                href="index.html"
              >
                <i class="fas fa-sign-out-alt"></i>Logout
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main>
      <div class="mt-5">
        <div class="container mt-5">
          <div class="row g-4 mt-4">
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="balance">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i class="fa fa-wallet fs-4" style="color: #108927"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Balance</h6>
                    <div class="h4 mb-0" id="current-amount">5000000</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="spent">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i class="fa-solid fa-dollar fs-4" style="color: #e63946"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Total Spent</h6>
                    <div class="h4 mb-0" id="spent-amount">5000000</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="month">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                    <span
                      ><i class="fa-solid fa-calendar fs-4" style="color: #c98a2c;"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">This Month</h6>
                    <div class="h4 mb-0" id="this-month">5000000</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-12">
              <div class="card h-100" id="category">
                <div
                  class="card-body d-flex justify-content-start align-items-center gap-3"
                >
                  <div>
                      <i class="fa-solid fa-tags fs-4" style="color:#1b2430;"></i>
                    </span>
                  </div>
                  <div>
                    <h6 class="card-subtitle mb-2 text-muted">Top Category</h6>
                    <div class="h4 mb-0" id="item-category">food</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="js\bootstrap-bundle.min.js"></script>
  </body>
</html>
