<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses</title>
    <!-- Bootstrap first -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- FontAwesome next -->
    <link
      rel="stylesheet"
      href="assets/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <!-- Your custom styles last so they successfully override bootstrap -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/navbar.css" />
  </head>

  <body>
    <div id="navbar-container"></div>
    <div id="logout-modal"></div>
    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <!-- Expense Form Card -->
          <div class="d-flex justify-content-end mb-4">
            <div class="input-group mb-4 form-control-search">
              <span class="input-group-text" id="search-addon">
                <!-- Bootstrap Icon -->
                <i class="fa fa-search"></i>
              </span>
              <input
                type="search"
                class="form-control"
                placeholder="Search..."
                aria-label="Search"
                aria-describedby="search-addon"
                id="search"
              />
            </div>
          </div>

          <div class="card shadow">
            <!-- Card Header -->
            <!-- Card Header -->
            <div
              class="card-header bg-primary text-white d-flex justify-content-between align-items-center flex-wrap"
            >
              <h2 class="mb-0">Your Expense History</h2>
              <a href="add-expense.html" class="btn btn-success btn-sm">
                <i class="fa-solid fa-plus me-2"></i>Expense
              </a>
            </div>
            <!-- Card Body -->
            <div class="card-body" id="body">
              <div
                class="d-flex flex-column align-items-center justify-content-center gap-3"
                style="height: 300px"
              >
                <i class="fa-solid fa-box-open text-muted fs-1"></i>
                <h4 class="text-muted">No Records Found</h4>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="container">
      <nav>
        <ul id="pagination" class="pagination justify-content-center"></ul>
      </nav>
    </div>
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 1100"
    >
      <div
        id="loginToast"
        class="toast align-items-center"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toastMessage"></div>
        </div>
      </div>
    </div>
    <div id="modal"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config/supabase.js"></script>
    <script src="js\auth\authguard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js\view.js"></script>
    <script src="js\componets\load_navebar.js"></script>
    <script src="js/componets/load-modal.js"></script>
    <script src="js/auth/logout.js"></script>
  </body>
</html>
