<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <!-- Bootstrap first -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- FontAwesome next -->
    <link
      rel="stylesheet"
      href="assets/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <!-- Your custom styles last so they successfully override bootstrap -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>

  <body>
    <div id="navbar-container"></div>
    <main>
      <div
        class="container d-flex justify-content-center align-items-center mt-5"
      >
        <div class="card">
          <div class="card-title text-center">
            <h1>WELCOME <span id="welcome-name"></span></h1>
          </div>
          <div class="card-body">
            <h6 style="font-weight: 900;">Name : <span id="name"></span></h6>
            <h6 style="font-weight: 900;" >Email : <span id="email"></span></h6>
            <h6 style="font-weight: 900;">Country : <span id="country"></span></h6>
            <h6 style="font-weight: 900;">Account Type : <span id="account-type"></span></h6>
            <h6 style="font-weight: 900;">Current Balance : <span id="balance"></span></h6>
            <h6 style="font-weight: 900;">Account Number : <span id="account-number"></span></h6>
            <div class="row justify-content-center w-100" id="button">
              <div class="col-6 text-center">
                <button class="btn" id="edit-btn">
                  <span><i class="fa fa-edit"></i></span> Profile
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 1100"
    >
      <div
        id="loginToast"
        class="toast align-items-center"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toastMessage"></div>
        </div>
      </div>
    </div>
    <div id="logout-modal"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config/supabase.js"></script>
    <script src="js\auth\authguard.js"></script>
    <script src="js/componets/load_navebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/profile.js"></script>
    <script src="js/componets/load-modal.js"></script>
    <script src="js/auth/logout.js"></script>
  </body>
</html>
