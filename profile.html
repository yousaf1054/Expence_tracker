<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <!-- Bootstrap first -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- FontAwesome next -->
    <link
      rel="stylesheet"
      href="assets/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <!-- Your custom styles last so they successfully override bootstrap -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-light custom-navbar">
      <div class="container-fluid px-4">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="home.html"
        >
          <i class="fas fa-wallet fs-4 text-success"></i>
          <div>
            <span class="fw-bold mb-0 h4 d-block">Ledger<span>.</span></span>
            <small
              style="
                font-size: 0.7rem;
                display: block;
                margin-top: -4px;
                color: var(--muted);
              "
              >Personal Expense Tracker</small
            >
          </div>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-2">
            <li class="nav-item">
              <a class="nav-link" href="home.html"
                ><i class="fas fa-home"></i>Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="add-expense.html"
                ><i class="fas fa-plus-circle"></i> Expense</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="view-expense.html"
                ><i class="fa fa-eye"></i> Expenses</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="profile.html"
                ><i class="fa fa-user"></i>Profile</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link logout-btn fw-semibold ms-lg-3"
                href="index.html"
              >
                <i class="fas fa-sign-out-alt"></i>Logout
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main>
      <div
        class="container d-flex justify-content-center align-items-center mt-5"
      >
        <div class="card">
          <div class="card-title text-center">
            <h1>WELCOME</h1>
          </div>
          <div class="card-body">
            <h6>Name : <span id="name"></span></h6>
            <h6>Email : <span id="email"></span></h6>
            <h6>Country : <span id="country"></span></h6>
            <h6>Account Type : <span id="account-type"></span></h6>
            <h6>Current Balance : <span id="balance"></span></h6>
            <h6>Account Number : <span id="account-number"></span></h6>
            <div class="row justify-content-center w-100" id="button">
              <div class="col-6 text-center">
                <button class="btn">
                  <span><i class="fa fa-edit"></i></span> Profile
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div
        class="toast-container position-fixed top-0 end-0 p-3"
        style="z-index: 1100"
      >
        <div
          id="loginToast"
          class="toast align-items-center"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="d-flex">
            <div class="toast-body" id="toastMessage"></div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
