<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ledger edite profile</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- FontAwesome next -->
    <link
      rel="stylesheet"
      href="assets/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .card {
        width: 50%;
        border-radius: 10px;
        font-weight: 900;
        font-size: medium;
        box-shadow: 5px 6px 7px gray;
        background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      }

      .card-body {
        display: flex;
        flex-direction: column;
        align-items: self-center;
        gap: 20px;
        padding: 30px;
        font-weight: 600;
        font-size: 1.2rem;
        border-radius: 12px;
      }
      #edit-btn {
        background-color: rgb(222, 148, 74);
        color: rgb(255, 255, 255);
        border-color: white;
        font-weight: 800;
        width: 90%;
      }
      #edit-btn:hover {
        background-color: white;
        color: black;
        transform: scale(1.1);
        transition: 0.3s ease-in-out;
        border-color: rgb(10, 10, 10);
      }
      h2 {
        font-weight: bolder;
        letter-spacing: -1px;
      }
    </style>
  </head>
  <body>
    <div>
      <div
        class="container min-vh-100 d-flex flex-column align-items-center justify-content-center"
      >
        <div class="login-brand text-center mb-4 mt-5">
          <h2>Edit Your Profile</h2>
        </div>
        <div class="row justify-content-center w-100">
          <div class="card col-lg-6 col-sm-10 col-md-8 mx-auto">
            <div class="card-body">
              <form id="signup-form" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Full name</label>
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="fa fa-user"></i
                    ></span>
                    <input
                      type="text"
                      class="form-control"
                      id="nameElement"
                      required
                      placeholder="Enter your full name"
                    />
                  </div>
                </div>
                <div class="mb-3">
                  <label for="account-type" class="form-label"
                    >Account Type</label
                  >
                  <div class="input-group">
                    <select id="account-type" class="form-select">
                      <option value="" disabled selected>
                        Select account type
                      </option>
                      <option value="personal">Personal</option>
                      <option value="business">Business</option>
                    </select>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="account-type" class="form-label">Country</label>
                  <div class="input-group">
                    <select id="country" class="form-select">
                      <option value="" disabled selected>
                        select your country
                      </option>
                      <option value="India">India</option>
                      <option value="USA">USA</option>
                      <option value="urope">Europe</option>
                      <option value="China">China</option>
                    </select>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="account-number" class="form-label"
                    >Account Number</label
                  >
                  <div class="input-group">
                    <input
                      type="number"
                      class="form-control"
                      id="account-number"
                      placeholder="Enter your account number"
                      required
                    />
                  </div>
                </div>
                <div class="row d-flex justify-content-center mt-4">
                  <button
                    type="submit"
                    id="edit-btn2"
                    class="btn btn-success col-12"
                  >
                    <i class="fa fa-save fs-6"></i> save changes
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      style="z-index: 1100"
    >
      <div
        id="loginToast"
        class="toast align-items-center"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toastMessage"></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config/supabase.js"></script>
    <script src="js\auth\authguard.js"></script>
    <script src="js/componets/load_navebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/edit_profile.js"></script>
    <script src="js/componets/load-modal.js"></script>
    <script src="js/auth/logout.js"></script>
  </body>
</html>
