<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEDGER</title>
  <link rel="icon" href="assets/image/logo.jpeg" type="image/x-icon" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/login.css" />
  <link rel="stylesheet" href="assets/fontawesome-free-7.2.0-web/fontawesome-free-7.2.0-web/css/all.min.css" />
</head>

<body>
  <div>
    <div class="container min-vh-100 d-flex flex-column align-items-center justify-content-center">
      <div class="login-brand text-center mb-4 mt-5">
        <h2 class="brand-name">Ledger<span>.</span></h2>
        <p class="brand-tag">Personal Expense Tracker</p>
      </div>
      <div class="row justify-content-center w-100">
        <div class="card col-12 col-sm-10 col-md-8 col-lg-6 mx-auto">
          <div class="card-title text-left mt-2 mb-0">
            <h2>Welcome</h2>
            <p>Sign in to your ledger to keep tracking.</p>
          </div>
          <div class="card-body">
            <form id="login-form">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                  <input type="email" class="form-control col-12 col-sm-10 col-md-8 col-lg-6 mx-auto" id="email"
                    placeholder="Enter your email" required />
                </div>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fa fa-lock"></i></span>
                  <input type="password" class="form-control col-12 col-sm-10 col-md-8 col-lg-6 mx-auto" id="password"
                    placeholder="Enter your password" required />
                </div>
              </div>
              <div class="d-flex justify-content-between">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="remeberme" />
                  <label class="form-check-label" for="remeber">Remeber me</label>
                </div>
                <div class="form-group">
                  <a href="#" class="toggle-link">Forgot password</a>
                </div>
              </div>
              <div class="row d-flex justify-content-center mt-3">
                <button type="button" class="btn btn-success col-12 mb-4" id="login">
                  Sign In
                </button>
              </div>
            </form>
            <div class="text-center mt-3">
              <span class="text-muted small">Don't have an account?</span>
              <a href="signup.html" class="toggle-link" id="showSignup">Create one</a>
            </div>
          </div>
        </div>
        <div class="text-center mt-5 mb-5">
          <span class="text-muted small">By signing in, you agree to our</span>
          <a href="#" class="toggle-link">Terms of Service</a>
        </div>
      </div>
    </div>
    <!-- Bootstrap Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100">
      <div id="loginToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
